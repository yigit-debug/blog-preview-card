<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">

  <title>Frontend Mentor | Blog preview card</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution {
      font-size: 11px;
      text-align: center;
    }

    .attribution a {
      color: hsl(228, 45%, 44%);
    }

    .attribution a:hover{
      color: white;
    }

    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: hsl(47, 88%, 63%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    img {
      border-radius: 15px;
      width: 100%;
    }

    .container {
      background-color: hsl(0, 0%, 100%);
      padding: 20px;
      width: 20%;
      border-radius: 20px;
      border: 1px solid black;
      box-shadow: 8px 8px rgba(0, 0, 0, 1);
      line-height: 1;
    }
    .container:hover{
      box-shadow: 12px 12px rgba(0, 0, 0, 1);
    }

    p {

      font-family: "Figtree", sans-serif;
      font-optical-sizing: auto;
      font-weight: 500;
      font-style: normal;
    }

    h2 {

      font-family: "Figtree", sans-serif;
      font-optical-sizing: auto;
      font-weight: 800;
      font-style: normal;

    }

    a {
      text-decoration: none;
      color: black;
    }

    a:hover {
      color: yellowgreen;
    }

    .learning {
      display: inline;
      background-color: hsl(47, 88%, 63%);
      padding: 6px 12px 6px 12px;
      border-radius: 5px;
      font-size: small;
      font-weight: 600;
    }

    .content {
      margin-top: 25px;
    }

    .date {
      margin-top: 20px;
      font-weight: 800;
      color: hsl(0, 0%, 42%);
      font-size: small;
    }

    .these {
      color: hsl(0, 0%, 42%);
      line-height: 1.5;

    }

    .gregcontainer {
      display: flex;
      align-items: center;
    }

    .gregimg {
      width: 32px;
    }

    .greg {
      font-weight: 800;
      margin-left: 10px;
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="image">
      <img src="assets/images/illustration-article.svg" alt="">
    </div>
    <div class="content">
      <p class="learning"><b>Learning</b></p>
      <p class="date">Published 21 Dec 2023</p><br>
      <a href="https://frontendmentor.io/">
        <h2>HTML & CSS foundations</h2>
      </a><br>
      <p class="these">These languages are the backbone of every website, defining structure, content, and presentation.
      </p><br>
      <div class="gregcontainer">
        <img class="gregimg" src="./assets/images/image-avatar.webp" alt="">
        <p class="greg">Greg Hooper</p>
      </div>
    </div>

  </div>
  

  <!-- Learning -->

  <!-- Published 21 Dec 2023 -->

  <!-- HTML & CSS foundations -->

  <!-- These languages are the backbone of every website, defining structure, content, and presentation. -->

  <!-- Greg Hooper -->

    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">Baha Yiğit Öztürk</a>.
  </div> -->
</body>

</html>
